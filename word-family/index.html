<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Family Revision &middot; LY3 &middot; Game 41</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background:linear-gradient(135deg,#fce4ec 0%,#e8f5e9 50%,#e3f2fd 100%);height:100vh;height:100dvh;display:flex;align-items:stretch;justify-content:center;overflow:hidden;user-select:none;-webkit-user-select:none}

#intro-screen{position:fixed;inset:0;background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);display:flex;align-items:center;justify-content:center;border:5px solid #FFD700;z-index:200;cursor:pointer}
#intro-logo{width:220px;height:auto;filter:drop-shadow(0 6px 20px rgba(0,0,0,0.5));animation:logoBounce 2s ease-in-out infinite;-webkit-user-drag:none;opacity:0;transition:opacity 0.3s}
#intro-logo.loaded{opacity:1}
@keyframes logoBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

#game-screen{display:none;flex-direction:column;width:100%;max-width:860px;height:100%;padding:14px 14px 75px;overflow:hidden}

.hdr{display:flex;align-items:center;justify-content:space-between;background:white;border-radius:18px;padding:10px 18px;margin-bottom:12px;box-shadow:0 4px 14px rgba(0,0,0,0.1);flex-shrink:0}
.hdr-score{font-size:1.2em;font-weight:bold;color:#4CAF50;min-width:70px}
.hdr-title{font-size:clamp(0.75em,2.5vw,1em);color:#6a0dad;font-weight:bold;text-align:center}
.mute-btn{width:44px;height:44px;min-height:44px;border:2px solid #ddd;border-radius:50%;background:white;font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}

.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-shrink:0}
.progress-label{font-size:0.9em;color:#777;white-space:nowrap}
.progress-bar-wrap{flex:1;height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#4CAF50,#8BC34A);transition:width 0.5s ease}

.instruction{text-align:center;font-size:clamp(1em,3.5vw,1.25em);color:#333;font-weight:800;margin-bottom:10px;padding:0 8px;line-height:1.4;flex-shrink:0}

/* ── Activity type badge ── */
.act-badge{display:inline-block;font-size:clamp(0.72em,2.3vw,0.88em);font-weight:800;padding:4px 14px;border-radius:20px;color:white;margin-bottom:8px;text-align:center;letter-spacing:0.04em}

/* ── Q card ── */
.q-card{background:white;border-radius:24px;padding:22px 18px;box-shadow:0 6px 24px rgba(0,0,0,0.1);display:flex;flex-direction:column;align-items:center;gap:18px;flex:1;min-height:0;justify-content:center;overflow:hidden;width:100%}

/* ── Image ── */
.img-wrap{flex:1;min-height:0;width:100%;display:flex;align-items:center;justify-content:center}
.img-wrap img{max-height:clamp(90px,28vh,190px);max-width:82%;object-fit:contain;border-radius:16px;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.12));opacity:0;transition:opacity 0.25s;-webkit-user-drag:none}
.img-wrap img.loaded{opacity:1}

/* ── Partial word (type=vowel) ── */
.partial-word{font-size:clamp(2.6em,9vw,4em);font-weight:800;color:#333;letter-spacing:0.08em;text-align:center;line-height:1}
.pw-blank{color:#6c5ce7;padding:0 6px;margin:0 2px}

/* ── Big word (type=family) ── */
.big-word{font-size:clamp(3em,11vw,5em);font-weight:800;letter-spacing:0.06em;text-align:center;line-height:1}
.family-hint{font-size:clamp(0.85em,2.8vw,1.05em);color:#888;font-weight:700;text-align:center;margin-top:-4px}

/* ── Vowel circle buttons ── */
.choices-row{display:flex;justify-content:center;gap:clamp(10px,3vw,20px);width:100%;flex-wrap:wrap}

.vowel-btn{width:clamp(72px,16vw,90px);height:clamp(72px,16vw,90px);border:4px solid transparent;border-radius:50%;font-size:clamp(1.8em,5vw,2.6em);font-weight:800;font-family:inherit;cursor:pointer;color:white;box-shadow:0 4px 14px rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;transition:transform 0.1s,border-color 0.2s,box-shadow 0.2s;touch-action:manipulation;min-height:44px;text-transform:lowercase}
.vowel-btn:active{transform:scale(0.92)}

/* ── Word choice buttons (type=word) ── */
.word-btn{min-width:clamp(80px,22vw,110px);padding:14px 16px;border:4px solid transparent;border-radius:18px;font-size:clamp(1.3em,4.5vw,1.8em);font-weight:800;font-family:inherit;cursor:pointer;color:white;background:linear-gradient(135deg,#6c5ce7,#a29bfe);box-shadow:0 4px 14px rgba(108,92,231,0.3);display:flex;align-items:center;justify-content:center;transition:transform 0.1s,border-color 0.2s;touch-action:manipulation;min-height:44px}
.word-btn:active{transform:scale(0.92)}

/* ── Button states ── */
.choice-btn.wrong{border-color:#f44336!important;border-width:5px!important;animation:shakeWrong 0.4s ease}
.choice-btn.hint{border-color:#FFD700!important;border-width:5px!important;animation:pulseHint 1s ease-in-out infinite}
.choice-btn.correct{border-color:#4CAF50!important;border-width:5px!important;box-shadow:0 0 0 6px rgba(76,175,80,0.3)!important;animation:popCorrect 0.35s ease}

@keyframes popCorrect{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shakeWrong{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes pulseHint{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.7)}50%{box-shadow:0 0 0 14px rgba(255,215,0,0)}}

/* ── Vowel family colour chips ── */
.vowel-chip{display:inline-block;width:20px;height:20px;border-radius:50%;margin:0 2px;vertical-align:middle}

.bottom-row{display:flex;justify-content:center;position:fixed;bottom:16px;left:0;right:0;z-index:50;pointer-events:none}
.btn-restart{pointer-events:all;background:linear-gradient(135deg,#FF9800,#F57C00);color:white;border:none;padding:12px 32px;border-radius:40px;font-size:1em;font-family:inherit;font-weight:bold;cursor:pointer;box-shadow:0 5px 14px rgba(255,152,0,0.4);min-height:44px;touch-action:manipulation}

#toast{position:fixed;top:18%;left:50%;transform:translateX(-50%) scale(0.7);padding:14px 30px;border-radius:50px;font-size:1.5em;font-weight:bold;color:white;pointer-events:none;opacity:0;transition:opacity 0.2s,transform 0.2s;z-index:500;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
#toast.show{opacity:1;transform:translateX(-50%) scale(1)}

.confetti{position:fixed;pointer-events:none;z-index:9998;border-radius:2px}

#end-screen{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;text-align:center;padding:30px}
.end-trophy{font-size:4.5em;animation:trophySpin 1.5s ease-out}
@keyframes trophySpin{from{transform:rotate(-20deg) scale(0)}60%{transform:rotate(10deg) scale(1.1)}to{transform:rotate(0) scale(1)}}
.end-title{color:#FFD700;font-size:clamp(1.5em,5vw,2.2em);font-weight:bold;text-shadow:0 3px 10px rgba(0,0,0,0.3)}
.end-sub{color:rgba(255,255,255,0.9);font-size:1.1em}
.end-score-box{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.35);border-radius:20px;padding:16px 40px;color:white;font-size:1.8em;font-weight:bold}
.end-stars{font-size:2.2em;letter-spacing:4px}
.btn-play-again{background:#FFD700;color:#333;border:none;padding:15px 45px;border-radius:40px;font-size:1.2em;font-family:inherit;font-weight:bold;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.2);margin-top:8px;min-height:44px;touch-action:manipulation}

@media(max-width:768px){
  #game-screen{padding:10px 10px 75px}
  .hdr-title{display:none}
}
@media(max-width:480px){
  #game-screen{padding:8px 10px 68px}
  .q-card{padding:12px 10px;gap:10px}
  .instruction{font-size:0.9em;margin-bottom:6px}
  .hdr-score{font-size:1em}
  .word-btn{padding:10px 8px;font-size:1.1em}
  .hdr-title{display:none}
}
@media(max-height:700px){
  .q-card{gap:10px}
  .vowel-btn{width:clamp(64px,13vw,80px);height:clamp(64px,13vw,80px);font-size:clamp(1.5em,4.5vw,2.2em)}
  .word-btn{font-size:clamp(1.1em,3.8vw,1.5em)}
}
@media(max-height:620px){
  .q-card{gap:7px;padding:10px 10px}
  .act-badge{font-size:clamp(0.65em,2vw,0.8em);padding:3px 10px}
  .partial-word{font-size:clamp(2em,7vw,3em)}
  .big-word{font-size:clamp(2.4em,8.5vw,3.8em)}
  .vowel-btn{width:clamp(56px,11vw,72px);height:clamp(56px,11vw,72px);font-size:1.3em}
  .choices-row{gap:8px}
}
</style>
</head>
<body>

<div id="intro-screen" onclick="startGame()">
  <img id="intro-logo" src="Assets/innovinelogo.png" alt="Innovine" onerror="this.style.display='none'" onload="this.classList.add('loaded')">
</div>
<div id="toast"></div>

<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">&#11088; <span id="score-val">0</span> / 15</div>
    <div class="hdr-title">Word Family Revision &middot; LY3</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">&#128266;</button>
  </div>
  <div class="progress-row">
    <span class="progress-label">Q <span id="q-num">1</span> / 15</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div class="instruction" id="instruction-txt"></div>
  <div class="q-card" id="q-card"></div>
  <div class="bottom-row">
    <button class="btn-restart" onclick="restartGame()">&#128260; &nbsp;Restart</button>
  </div>
</div>

<div id="end-screen">
  <div class="end-trophy">&#127942;</div>
  <div class="end-title">You have done a great job!</div>
  <div class="end-sub">You know all five vowel word families!</div>
  <div class="end-score-box">Score: &nbsp;<span id="final-score">0</span> / 15</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">&#9654; &nbsp;Play Again</button>
</div>

<script>
/* ── Vowel colours ── */
const VC = {
  a:'linear-gradient(135deg,#FF6B6B,#ee5a24)',
  e:'linear-gradient(135deg,#1dd1a1,#10ac84)',
  i:'linear-gradient(135deg,#54a0ff,#2e86de)',
  o:'linear-gradient(135deg,#FF9F43,#e67e22)',
  u:'linear-gradient(135deg,#a29bfe,#6c5ce7)',
};

/*
  Question types:
  'vowel'  → image + partial word (c_t) → pick 1 vowel from 3 choices
  'word'   → image → pick correct word from 3 word choices
  'family' → big word text only → pick vowel family (all 5 a/e/i/o/u)
*/
const QUESTIONS = [
  /* ── Type 1: Which vowel is in the middle? ── */
  { type:'vowel',  vowel:'a', word:'cat',  before:'c', after:'t',   img:'Assets/cat.png',   choices:['a','o','u'] },
  { type:'vowel',  vowel:'e', word:'bell', before:'b', after:'ll',  img:'Assets/bell.png',  choices:['a','e','i'] },
  { type:'vowel',  vowel:'i', word:'fish', before:'f', after:'sh',  img:'Assets/fish.png',  choices:['e','i','o'] },
  { type:'vowel',  vowel:'o', word:'dog',  before:'d', after:'g',   img:'Assets/dog.png',   choices:['i','o','u'] },
  { type:'vowel',  vowel:'u', word:'duck', before:'d', after:'ck',  img:'Assets/duck.png',  choices:['a','i','u'] },

  /* ── Type 2: Which word matches the picture? ── */
  { type:'word',   vowel:'a', word:'cat',  img:'Assets/cat.png',   choices:['cat','cot','cut'] },
  { type:'word',   vowel:'e', word:'bell', img:'Assets/bell.png',  choices:['bill','bell','bull'] },
  { type:'word',   vowel:'i', word:'pig',  img:'Assets/pig.png',   choices:['pig','peg','pug'] },
  { type:'word',   vowel:'o', word:'dog',  img:'Assets/dog.png',   choices:['dog','dig','dug'] },
  { type:'word',   vowel:'u', word:'duck',   img:'Assets/duck.png',   choices:['duck','deck','dock'] },
  { type:'word',   vowel:'o', word:'monkey', img:'Assets/monkey.png', choices:['monkey','donkey','turkey'] },

  /* ── Type 3: Which vowel family? (no image, big word) ── */
  { type:'family', vowel:'a', word:'fan' },
  { type:'family', vowel:'e', word:'hen' },
  { type:'family', vowel:'i', word:'bin' },
  { type:'family', vowel:'o', word:'log' },
  { type:'family', vowel:'u', word:'sun' },
];

/* Preload images */
QUESTIONS.filter(q=>q.img).forEach(q=>{ new Image().src=q.img; });

let curQ=0, score=0, attempts=0, answered=false, muted=false;

/* ── Audio ── */
const sndWrong=new Audio('Assets/wrong.mp3');
const sndClaps=new Audio('Assets/free_claps.mp3');
function unlockAudio(){[sndWrong,sndClaps].forEach(s=>{s.play().catch(()=>{});s.pause();s.currentTime=0});document.removeEventListener('pointerdown',unlockAudio)}
document.addEventListener('pointerdown',unlockAudio);
function play(s){if(muted)return;window.speechSynthesis?.cancel();s.currentTime=0;s.play().catch(()=>{})}
function speak(text){
  sndClaps.pause();sndClaps.currentTime=0;
  if(!('speechSynthesis' in window)||muted)return;
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    if(muted)return;
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';u.rate=0.68;u.pitch=1.0;
    const v=window.speechSynthesis.getVoices();
    const voice=v.find(x=>x.lang.startsWith('en')&&!x.name.includes('Google'))||v.find(x=>x.lang.startsWith('en'))||v[0];
    if(voice)u.voice=voice;
    window.speechSynthesis.speak(u);
  },150);
}
window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged',()=>window.speechSynthesis.getVoices());
function playClaps(){if(muted)return;sndClaps.currentTime=0;sndClaps.play().catch(()=>{});setTimeout(()=>{sndClaps.pause();sndClaps.currentTime=0;},3000)}

/* ── Shuffle ── */
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ── Load question ── */
function loadQuestion(){
  if(curQ>=QUESTIONS.length){showEnd();return;}
  answered=false; attempts=0;
  const q=QUESTIONS[curQ];

  document.getElementById('q-num').textContent=curQ+1;
  document.getElementById('score-val').textContent=score;
  document.getElementById('prog-bar').style.width=(curQ/QUESTIONS.length*100)+'%';

  /* Instruction text + TTS */
  let instr='';
  if(q.type==='vowel')  instr=`Which vowel goes in "${q.word}"?`;
  if(q.type==='word')   instr='Which word matches the picture?';
  if(q.type==='family') instr=`Which vowel family does "${q.word}" belong to?`;
  document.getElementById('instruction-txt').textContent=instr.toUpperCase();
  speak(instr);

  /* Render card */
  if(q.type==='vowel')  renderVowelPick(q);
  else if(q.type==='word') renderWordPick(q);
  else renderFamilyPick(q);
}

/* ── Type 1: Vowel Pick ── */
function renderVowelPick(q){
  const card=document.getElementById('q-card');
  card.innerHTML='';

  /* Badge */
  addBadge(card,'🔤 Fill in the vowel','#e64980');

  /* Image */
  const imgWrap=document.createElement('div');
  imgWrap.className='img-wrap';
  const img=document.createElement('img');
  img.alt=q.word; img.src=q.img;
  img.onerror=()=>{imgWrap.style.display='none'};
  if(img.complete&&img.naturalWidth>0)img.classList.add('loaded');
  else img.onload=()=>img.classList.add('loaded');
  imgWrap.appendChild(img); card.appendChild(imgWrap);

  /* Partial word */
  const pw=document.createElement('div');
  pw.className='partial-word';
  pw.innerHTML=`${q.before}<span class="pw-blank">_</span>${q.after}`;
  card.appendChild(pw);

  /* Vowel buttons (shuffled) */
  const row=document.createElement('div');
  row.className='choices-row';
  shuffle(q.choices).forEach(v=>{
    const btn=document.createElement('button');
    btn.className='choice-btn vowel-btn';
    btn.dataset.value=v;
    btn.style.background=VC[v]||'#888';
    btn.textContent=v;
    btn.addEventListener('touchend',e=>{e.preventDefault();selectAnswer(v);},{passive:false});
    btn.onclick=()=>selectAnswer(v);
    row.appendChild(btn);
  });
  card.appendChild(row);
}

/* ── Type 2: Word Pick ── */
function renderWordPick(q){
  const card=document.getElementById('q-card');
  card.innerHTML='';

  addBadge(card,'🖼️ Match the picture','#0984e3');

  /* Image */
  const imgWrap=document.createElement('div');
  imgWrap.className='img-wrap';
  const img=document.createElement('img');
  img.alt=q.word; img.src=q.img;
  img.onerror=()=>{imgWrap.style.display='none'};
  if(img.complete&&img.naturalWidth>0)img.classList.add('loaded');
  else img.onload=()=>img.classList.add('loaded');
  imgWrap.appendChild(img); card.appendChild(imgWrap);

  /* Word buttons (shuffled) */
  const row=document.createElement('div');
  row.className='choices-row';
  shuffle(q.choices).forEach(w=>{
    const btn=document.createElement('button');
    btn.className='choice-btn word-btn';
    btn.dataset.value=w;
    btn.textContent=w;
    btn.addEventListener('touchend',e=>{e.preventDefault();selectAnswer(w);},{passive:false});
    btn.onclick=()=>selectAnswer(w);
    row.appendChild(btn);
  });
  card.appendChild(row);
}

/* ── Type 3: Family Pick ── */
function renderFamilyPick(q){
  const card=document.getElementById('q-card');
  card.innerHTML='';

  addBadge(card,'📂 Sort by vowel family','#6c5ce7');

  /* Big word */
  const bw=document.createElement('div');
  bw.className='big-word';
  bw.style.color=getVowelHex(q.vowel);
  bw.textContent=q.word;
  card.appendChild(bw);

  const hint=document.createElement('p');
  hint.className='family-hint';
  hint.textContent='Which vowel family?';
  card.appendChild(hint);

  /* All 5 vowel buttons (a, e, i, o, u) — not shuffled, always in order */
  const row=document.createElement('div');
  row.className='choices-row';
  ['a','e','i','o','u'].forEach(v=>{
    const btn=document.createElement('button');
    btn.className='choice-btn vowel-btn';
    btn.dataset.value=v;
    btn.style.background=VC[v];
    btn.textContent=v;
    btn.addEventListener('touchend',e=>{e.preventDefault();selectAnswer(v);},{passive:false});
    btn.onclick=()=>selectAnswer(v);
    row.appendChild(btn);
  });
  card.appendChild(row);
}

function getVowelHex(v){
  return {a:'#ee5a24',e:'#10ac84',i:'#2e86de',o:'#e67e22',u:'#6c5ce7'}[v]||'#333';
}

function addBadge(card,label,color){
  const b=document.createElement('div');
  b.className='act-badge';
  b.style.background=color;
  b.textContent=label;
  card.appendChild(b);
}

/* ── Answer selection ── */
function selectAnswer(value){
  if(answered)return;
  const q=QUESTIONS[curQ];
  const correct=q.type==='word'?q.word:q.vowel;
  if(value===correct) registerCorrect(value);
  else registerWrong(value,correct);
}

function getBtn(value){
  return document.querySelector(`.choice-btn[data-value="${value}"]`);
}

function clearBtnStates(){
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.classList.remove('wrong','hint','correct');
  });
}

function fillBlank(vowel){
  const blank=document.querySelector('.pw-blank');
  if(!blank)return;
  blank.textContent=vowel;
  blank.style.color=getVowelHex(vowel);
  blank.style.animation='popCorrect 0.35s ease both';
}

function registerCorrect(value){
  answered=true;
  clearBtnStates();
  getBtn(value)?.classList.add('correct');
  if(QUESTIONS[curQ].type==='vowel') fillBlank(value);
  score++;
  document.getElementById('score-val').textContent=score;
  window.speechSynthesis?.cancel();
  playClaps();
  showToast('⭐ Correct!','#4CAF50');
  spawnConfetti();
  setTimeout(()=>{curQ++;loadQuestion();},3200);
}

function registerWrong(value,correct){
  if(answered)return;
  attempts++;
  const wrongBtn=getBtn(value);
  const correctBtn=getBtn(correct);

  if(attempts===1){
    wrongBtn?.classList.add('wrong');
    play(sndWrong);
    showToast('❌ Try again!','#f44336');
    setTimeout(()=>{
      wrongBtn?.classList.remove('wrong');
      if(!answered) correctBtn?.classList.add('hint');
    },900);
  } else {
    answered=true;
    const q=QUESTIONS[curQ];
    wrongBtn?.classList.add('wrong');
    play(sndWrong);
    showToast('❌ Wrong!','#f44336');
    setTimeout(()=>{
      clearBtnStates();
      correctBtn?.classList.add('correct');
      if(q.type==='vowel') fillBlank(correct);
      showToast('💡 Correct answer!','#FF9800');
      setTimeout(()=>{curQ++;loadQuestion();},3000);
    },1000);
  }
}

/* ── Navigation ── */
function startGame(){
  document.getElementById('intro-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  curQ=0; score=0;
  loadQuestion();
}

function restartGame(){
  window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  curQ=0; score=0; attempts=0; answered=false;
  loadQuestion();
}

/* ── Toast ── */
let toastTimer=null;
function showToast(msg,bg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=bg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),1400);
}

/* ── Confetti ── */
const CC=['#FFD700','#FF6B6B','#4CAF50','#2196F3','#FF9800','#AB47BC','#26C6DA'];
function spawnConfetti(){
  for(let i=0;i<70;i++) setTimeout(()=>{
    const el=document.createElement('div'); el.className='confetti';
    const sz=6+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}vw;top:-12px;width:${sz}px;height:${sz}px;background:${CC[Math.floor(Math.random()*CC.length)]};border-radius:${Math.random()>.4?'50%':'2px'};animation:cfFall ${1.4+Math.random()*1.8}s linear forwards`;
    document.body.appendChild(el); setTimeout(()=>el.remove(),3500);
  },i*22);
}
if(!document.querySelector('#cf-style')){
  const s=document.createElement('style');s.id='cf-style';
  s.textContent='@keyframes cfFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}';
  document.head.appendChild(s);
}

/* ── Mute ── */
function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').innerHTML=muted?'&#128263;':'&#128266;';
  if(muted){window.speechSynthesis?.cancel();sndClaps.pause();}
  else{
    const q=QUESTIONS[curQ];
    if(!q)return;
    if(q.type==='vowel')  speak(`Which vowel goes in "${q.word}"?`);
    if(q.type==='word')   speak('Which word matches the picture?');
    if(q.type==='family') speak(`Which vowel family does "${q.word}" belong to?`);
  }
}

/* ── End ── */
function showEnd(){
  document.getElementById('game-screen').style.display='none';
  document.getElementById('end-screen').style.display='flex';
  document.getElementById('final-score').textContent=score;
  document.getElementById('end-stars').innerHTML=score>=13?'&#11088;&#11088;&#11088;':score>=9?'&#11088;&#11088;':'&#11088;';
  window.speechSynthesis?.cancel();
  playClaps(); spawnConfetti(); setTimeout(spawnConfetti,800);
}
</script>
