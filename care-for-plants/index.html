<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Care for the Plants · LY4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',Arial,sans-serif;background:linear-gradient(135deg,#e8f5e9 0%,#f3e5f5 50%,#e3f2fd 100%);height:100vh;height:100dvh;display:flex;align-items:stretch;justify-content:center;overflow:hidden;user-select:none;-webkit-user-select:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent}

    /* ── INTRO ── */
    #intro-screen{position:fixed;inset:0;background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);display:flex;align-items:center;justify-content:center;z-index:200;cursor:pointer}
    #intro-logo{width:220px;height:auto;filter:drop-shadow(0 6px 20px rgba(0,0,0,0.5));animation:logoBounce 2s ease-in-out infinite;opacity:0;transition:opacity 0.3s}
    #intro-logo.loaded{opacity:1}
    @keyframes logoBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

    /* ── GAME SCREEN ── */
    #game-screen{display:none;flex-direction:column;width:100%;max-width:820px;height:100%;padding:12px 16px calc(72px + env(safe-area-inset-bottom,0px));overflow:hidden}

    /* ── HEADER ── */
    .hdr{display:flex;align-items:center;justify-content:space-between;background:white;border-radius:18px;padding:10px 16px;margin-bottom:10px;box-shadow:0 4px 14px rgba(0,0,0,0.1);flex-shrink:0}
    .hdr-score{font-size:1.1em;font-weight:800;color:#2e7d32;min-width:70px}
    .hdr-title{font-size:clamp(0.7em,2.4vw,0.95em);color:#6a0dad;font-weight:800;text-align:center}
    .mute-btn{width:42px;height:42px;min-width:42px;border:2px solid #ddd;border-radius:50%;background:white;font-size:1.1em;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation}

    /* ── PROGRESS ── */
    .progress-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-shrink:0}
    .progress-label{font-size:0.88em;color:#777;font-weight:700;white-space:nowrap}
    .progress-bar-wrap{flex:1;height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden}
    .progress-bar-fill{height:100%;border-radius:5px;background:linear-gradient(90deg,#4caf50,#8bc34a);transition:width 0.5s ease}

    /* ── QUESTION BANNER ── */
    .q-banner{background:linear-gradient(135deg,#2e7d32,#43a047);color:white;border-radius:14px;padding:10px 16px;font-size:clamp(0.88em,2.6vw,1.05em);font-weight:800;text-align:center;margin-bottom:10px;flex-shrink:0;box-shadow:0 4px 12px rgba(46,125,50,0.3)}

    /* ── 3-CARD GRID ── */
    .cards-area{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;overflow:visible;padding:8px}
    .cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(8px,2.5vw,20px);align-content:center;width:100%;min-height:0}

    /* ── OPTION CARD ── */
    .opt-card{background:white;border-radius:16px;border:4px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,0.1);transition:transform 0.12s,border-color 0.2s,box-shadow 0.2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;position:relative;overflow:hidden}
    .opt-card:not(.disabled):active{transform:scale(0.95)}

    .opt-card .card-img-wrap{width:100%;aspect-ratio:3/4;max-height:42dvh;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:10px;background:#f7f7f7}
    .opt-card .card-img-wrap img{width:100%;height:100%;object-fit:contain;border-radius:10px;opacity:0;transition:opacity 0.3s;-webkit-user-drag:none;display:block}
    .opt-card .card-img-wrap img.loaded{opacity:1}

    /* ── CARD STATES ── */
    .opt-card.correct{border-color:#4caf50!important;background:#f1f8e9;box-shadow:0 0 0 5px rgba(76,175,80,0.35),0 6px 20px rgba(76,175,80,0.25)!important;animation:popCorrect 0.38s ease both}
    .opt-card.wrong  {border-color:#ef5350!important;background:#fce4ec;animation:shakeWrong 0.45s ease}
    .opt-card.hint   {border-color:#FFD700!important;animation:pulseHint 0.9s ease-in-out infinite}
    .opt-card.disabled{cursor:default}

    @keyframes popCorrect{0%{transform:scale(1)}50%{transform:scale(1.07)}100%{transform:scale(1)}}
    @keyframes shakeWrong{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
    @keyframes pulseHint{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.8),0 4px 14px rgba(0,0,0,0.1)}50%{box-shadow:0 0 0 14px rgba(255,215,0,0),0 4px 14px rgba(0,0,0,0.1)}}

    /* ── RESULT BADGE ── */
    .result-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-54%) scale(0);font-size:clamp(1.8em,8vw,2.6em);pointer-events:none;transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1);z-index:2}
    .result-badge.show{transform:translate(-50%,-54%) scale(1)}

    /* ── SPARKLE ── */
    .sparkle-wrap{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:3}
    .spark{position:absolute;font-size:1em;pointer-events:none;animation:sparkFly 0.75s ease-out forwards}
    @keyframes sparkFly{0%{opacity:1;transform:translate(0,0) scale(1.3)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}

    /* ── TOAST ── */
    #toast{position:fixed;top:18%;left:50%;transform:translateX(-50%) scale(0.7);padding:12px 28px;border-radius:50px;font-size:1.35em;font-weight:bold;color:white;pointer-events:none;opacity:0;transition:opacity 0.2s,transform 0.2s;z-index:500;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.2)}
    #toast.show{opacity:1;transform:translateX(-50%) scale(1)}

    /* ── RESTART BUTTON (fixed bottom) ── */
    .bottom-row{display:flex;justify-content:center;position:fixed;bottom:max(14px,env(safe-area-inset-bottom,0px));left:0;right:0;z-index:50;pointer-events:none}
    .btn-restart{pointer-events:all;background:linear-gradient(135deg,#FF9800,#F57C00);color:white;border:none;padding:12px 32px;border-radius:40px;font-size:1em;font-family:inherit;font-weight:bold;cursor:pointer;box-shadow:0 5px 14px rgba(255,152,0,0.4);min-height:44px;touch-action:manipulation}

    /* ── END SCREEN ── */
    #end-screen{display:none;position:fixed;inset:0;background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;text-align:center;padding:30px}
    .end-trophy{font-size:4.5em;animation:trophySpin 1.5s ease-out}
    @keyframes trophySpin{from{transform:rotate(-20deg) scale(0)}60%{transform:rotate(10deg) scale(1.1)}to{transform:rotate(0) scale(1)}}
    .end-cert{background:rgba(255,255,255,0.18);border:2px solid rgba(255,255,255,0.4);border-radius:16px;padding:8px 22px;color:#FFD700;font-size:clamp(0.9em,3vw,1.1em);font-weight:800}
    .end-title{color:#FFD700;font-size:clamp(1.5em,5vw,2.2em);font-weight:bold;text-shadow:0 3px 10px rgba(0,0,0,0.3)}
    .end-sub{color:rgba(255,255,255,0.9);font-size:1.05em}
    .end-score-box{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.35);border-radius:20px;padding:14px 40px;color:white;font-size:1.8em;font-weight:bold}
    .end-stars{font-size:2.2em;letter-spacing:4px}
    .btn-play-again{background:#FFD700;color:#333;border:none;padding:15px 45px;border-radius:40px;font-size:1.2em;font-family:inherit;font-weight:bold;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,0.2);margin-top:6px;min-height:44px;touch-action:manipulation}

    #confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:210}

    @media(max-height:680px){
      .q-banner{padding:7px 14px;margin-bottom:6px}
      .progress-row{margin-bottom:6px}
      .hdr{padding:7px 12px;margin-bottom:6px}
      .opt-card .card-img-wrap{max-height:34dvh}
    }
    @media(max-height:560px){
      .opt-card .card-img-wrap{max-height:28dvh}
      .q-banner{margin-bottom:4px;padding:5px 10px}
    }
    @media(max-width:380px){
      .hdr-title{display:none}
      .cards-grid{gap:6px}
    }
  </style>
</head>
<body>

<div id="intro-screen" onclick="startGame()">
  <img id="intro-logo" src="Assets/innovinelogo.png" alt="Innovine"
    onload="this.classList.add('loaded')" onerror="this.style.display='none'">
</div>

<div id="toast"></div>

<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">⭐ <span id="score-val">0</span> / 4</div>
    <div class="hdr-title">🌿 Care for the Plants</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
  </div>
  <div class="progress-row">
    <span class="progress-label">Level <span id="lvl-num">1</span> / 4</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div class="q-banner" id="q-banner">Which child is caring for the plant?</div>
  <div class="cards-area">
    <div class="cards-grid" id="cards-grid"></div>
  </div>
</div>

<div class="bottom-row">
  <button class="btn-restart" onclick="restartGame()">🔄 &nbsp;Restart</button>
</div>

<div id="end-screen">
  <div class="end-trophy">🏆</div>
  <div class="end-cert">🌿 Plant Care Champion! 🌿</div>
  <div class="end-title">You have done a great job!</div>
  <div class="end-sub">You know how to take care of plants!</div>
  <div class="end-score-box">⭐ &nbsp;<span id="end-score">4</span> / 4</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">▶ &nbsp;Play Again</button>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
// ── LEVEL DATA ──
// src = exact filename; label = correct English spelling shown to child
const LEVELS = [
  {
    banner: '💧 Which child is watering the plant?',
    options: [
      { src:'Assets/child_watering_the%20plant.png',              label:'Watering the plant',              correct:true  },
      { src:'Assets/child%20srepping%20on%20the%20plantr.png',    label:'Stepping on the plant',           correct:false },
      { src:'Assets/child%20throwing%20garbage%20near%20the%20plant.png', label:'Throwing garbage near the plant', correct:false },
    ]
  },
  {
    banner: '🌱 Which child is planting a sapling?',
    options: [
      { src:'Assets/child%20planting%20sapling.png',              label:'Planting a sapling',              correct:true  },
      { src:'Assets/child%20pulling%20out%20the%20plant.png',     label:'Pulling out the plant',           correct:false },
      { src:'Assets/child%20breaking%20branches.png',             label:'Breaking branches',               correct:false },
    ]
  },
  {
    banner: '🌿 Which child is removing weeds?',
    options: [
      { src:'Assets/child%20remmoving%20weeds%20around%20the%20olant.png', label:'Removing weeds around the plant', correct:true },
      { src:'Assets/child%20damaging%20the%20flower%20pot.png',   label:'Damaging the flower pot',         correct:false },
      { src:'Assets/chils_plucking_leaves.png',                   label:'Plucking the leaves',             correct:false },
    ]
  },
  {
    banner: '♻️ Which child is putting waste in the dustbin?',
    options: [
      { src:'Assets/child%20putting%20waste%20in%20the%20dustin.png', label:'Putting waste in the dustbin', correct:true },
      { src:'Assets/chils%20throwing%20litter.jpg',               label:'Throwing litter near plants',     correct:false },
      { src:'Assets/child%20throwing%20stones%20at%20the%20plant.png', label:'Throwing stones at the plant', correct:false },
    ]
  },
];

const TOTAL = LEVELS.length;

// ── PRELOAD ALL IMAGES ──
LEVELS.forEach(lvl => lvl.options.forEach(opt => {
  const p = new Image(); p.src = opt.src;
}));

// ── STATE ──
let currentLevel = 0, score = 0, attempts = 0, answered = false, muted = false;

// ── AUDIO ──
const sndWrong = new Audio('Assets/wrong.mp3');
const sndClaps = new Audio('Assets/free_claps.mp3');
document.addEventListener('pointerdown', function unlock() {
  [sndWrong, sndClaps].forEach(s => { s.play().catch(()=>{}); s.pause(); s.currentTime = 0; });
  document.removeEventListener('pointerdown', unlock);
}, { once: true });
function playSound(s) { if (muted) return; s.currentTime = 0; s.play().catch(()=>{}); }
function playShortClap() {
  if (muted) return;
  sndClaps.currentTime = 0; sndClaps.play().catch(()=>{});
  setTimeout(() => { sndClaps.pause(); sndClaps.currentTime = 0; }, 1200);
}
function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  if (muted) { window.speechSynthesis?.cancel(); sndClaps.pause(); }
}

// ── TTS ──
window.speechSynthesis?.getVoices();
window.speechSynthesis?.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
function speakThen(text, cb) {
  if (!('speechSynthesis' in window)) { if (cb) setTimeout(cb, 400); return; }
  window.speechSynthesis.cancel();
  if (muted) { if (cb) setTimeout(cb, 100); return; }
  setTimeout(() => {
    if (muted) { if (cb) setTimeout(cb, 100); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.75; u.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en') && !v.name.includes('Google'))
                 || voices.find(v => v.lang.startsWith('en'))
                 || voices[0];
    if (enVoice) u.voice = enVoice;
    if (cb) { u.onend = cb; u.onerror = cb; }
    window.speechSynthesis.speak(u);
  }, 150);
}
function speak(text) { speakThen(text, null); }

// ── SHUFFLE ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ── TOAST ──
let toastTimer = null;
function showToast(msg, color, dur = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = color;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

// ── LOAD LEVEL ──
function loadLevel(idx) {
  answered = false; attempts = 0;
  const lvl = LEVELS[idx];

  document.getElementById('lvl-num').textContent = idx + 1;
  document.getElementById('score-val').textContent = score;
  document.getElementById('prog-bar').style.width = (idx / TOTAL * 100) + '%';
  document.getElementById('q-banner').textContent = lvl.banner;
  speak(lvl.banner.replace(/^[^\w\s]+\s*/, '')); // strip leading emoji before speaking

  const shuffled = shuffle(lvl.options);
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  shuffled.forEach((opt, i) => {
    const card = document.createElement('div');
    card.className = 'opt-card';

    const imgWrap = document.createElement('div');
    imgWrap.className = 'card-img-wrap';
    const img = document.createElement('img');
    img.alt = opt.label;
    img.draggable = false;
    img.onload  = () => img.classList.add('loaded');
    img.onerror = () => { img.style.opacity = '0.3'; img.classList.add('loaded'); };
    img.src = opt.src;
    if (img.complete && img.naturalWidth > 0) img.classList.add('loaded');
    imgWrap.appendChild(img);

    const badge = document.createElement('div');
    badge.className = 'result-badge';
    badge.id = `badge-${i}`;

    const sparks = document.createElement('div');
    sparks.className = 'sparkle-wrap';
    sparks.id = `sparks-${i}`;

    card.appendChild(imgWrap);
    card.appendChild(badge);
    card.appendChild(sparks);

    card._isCorrect = !!opt.correct;

    card.addEventListener('pointerup', (e) => { e.preventDefault(); selectOption(card, opt, i); });
    grid.appendChild(card);
  });
}

// ── SELECT OPTION ──
function selectOption(card, opt, idx) {
  if (answered) return;

  const allCards = document.querySelectorAll('.opt-card');
  const badge = document.getElementById(`badge-${idx}`);

  if (opt.correct) {
    answered = true;
    allCards.forEach(c => c.classList.add('disabled'));
    card.classList.add('correct');
    badge.textContent = '✅'; badge.classList.add('show');
    spawnSparkles(idx);
    score++;
    document.getElementById('score-val').textContent = score;
    showToast('⭐ Correct!', '#4caf50');
    speakThen('Well done!', () => {
      playShortClap();
      launchConfetti();
      setTimeout(() => {
        stopConfetti();
        currentLevel++;
        if (currentLevel >= TOTAL) showEnd();
        else loadLevel(currentLevel);
      }, 1800);
    });

  } else {
    attempts++;
    card.classList.add('wrong', 'disabled');
    badge.textContent = '❌'; badge.classList.add('show');
    playSound(sndWrong);
    speak('Try again!');

    if (attempts === 1) {
      // 1st wrong: shake, then show hint glow on correct card
      showToast('❌ Try again!', '#f44336');
      setTimeout(() => {
        card.classList.remove('wrong', 'disabled');
        badge.classList.remove('show'); badge.textContent = '';
        // Glow the correct card
        allCards.forEach(c => { if (c._isCorrect) c.classList.add('hint'); });
      }, 900);
    } else {
      // 2nd wrong: auto-reveal correct card, then advance
      answered = true;
      showToast('💡 Correct answer!', '#FF9800');
      setTimeout(() => {
        allCards.forEach(c => c.classList.remove('hint', 'wrong', 'disabled'));
        // Show correct card
        allCards.forEach(c => {
          if (c._isCorrect) {
            c.classList.add('correct');
            const b = c.querySelector('.result-badge');
            if (b) { b.textContent = '✅'; b.classList.add('show'); }
          }
        });
        setTimeout(() => {
          currentLevel++;
          if (currentLevel >= TOTAL) showEnd();
          else loadLevel(currentLevel);
        }, 1800);
      }, 900);
    }
  }
}

// ── SPARKLES ──
function spawnSparkles(idx) {
  const wrap = document.getElementById(`sparks-${idx}`);
  const emojis = ['✨','🌟','💫','🌿','🍃','⭐','🌸'];
  for (let i = 0; i < 9; i++) {
    const sp = document.createElement('div');
    sp.className = 'spark';
    sp.textContent = emojis[i % emojis.length];
    const angle = (i / 9) * 360;
    const dist = 38 + Math.random() * 28;
    sp.style.setProperty('--tx', `${Math.cos(angle * Math.PI/180) * dist}px`);
    sp.style.setProperty('--ty', `${Math.sin(angle * Math.PI/180) * dist}px`);
    sp.style.left = `${35 + Math.random()*30}%`;
    sp.style.top  = `${30 + Math.random()*30}%`;
    sp.style.animationDelay = `${i * 0.03}s`;
    wrap.appendChild(sp);
    setTimeout(() => sp.remove(), 800);
  }
}

// ── END SCREEN ──
function playClaps() {
  if (muted) return;
  sndClaps.currentTime = 0; sndClaps.play().catch(()=>{});
  setTimeout(() => { sndClaps.pause(); sndClaps.currentTime = 0; }, 3000);
}
function showEnd() {
  playClaps();
  const perfect = score === TOTAL;
  document.getElementById('end-score').textContent = score;
  document.getElementById('end-stars').textContent = '⭐'.repeat(score) + (score < TOTAL ? '☆'.repeat(TOTAL - score) : '');
  document.getElementById('end-screen').style.display = 'flex';
  document.getElementById('prog-bar').style.width = '100%';
  launchConfetti();
}

// ── RESTART ──
function restartGame() {
  window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display = 'none';
  stopConfetti();
  currentLevel = 0; score = 0; attempts = 0; answered = false;
  loadLevel(0);
}

// ── START ──
function startGame() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';
  loadLevel(0);
}

// ── CONFETTI ──
const confCanvas = document.getElementById('confetti-canvas');
const confCtx = confCanvas.getContext('2d');
let confParts = [], confRaf = null;
const CC = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#f06595'];
function launchConfetti() {
  confCanvas.width = window.innerWidth; confCanvas.height = window.innerHeight;
  confParts = Array.from({length:90}, () => ({
    x: Math.random()*confCanvas.width, y: -20 - Math.random()*80,
    vx: (Math.random()-0.5)*3.5, vy: Math.random()*3+1.5,
    color: CC[Math.floor(Math.random()*CC.length)],
    w: Math.random()*10+5, h: Math.random()*6+4,
    rot: Math.random()*360, rv: (Math.random()-0.5)*7,
  }));
  animConf();
}
function animConf() {
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  confParts.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.rv;
    confCtx.save(); confCtx.translate(p.x,p.y); confCtx.rotate(p.rot*Math.PI/180);
    confCtx.fillStyle=p.color; confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h); confCtx.restore();
  });
  confParts = confParts.filter(p => p.y < confCanvas.height+30);
  if (confParts.length > 0) confRaf = requestAnimationFrame(animConf);
}
function stopConfetti() {
  if (confRaf) { cancelAnimationFrame(confRaf); confRaf = null; }
