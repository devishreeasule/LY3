<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>In-Between Numbers 31–50 · LY3 · Game 34</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 50%, #e3f2fd 100%);
      height: 100vh; height: 100dvh;
      display: flex; align-items: stretch; justify-content: center;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }

    /* ── INTRO ── */
    #intro-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc);
      display: flex; align-items: center; justify-content: center;
      border: 5px solid #FFD700; z-index: 200; cursor: pointer;
    }
    #intro-logo { width: 220px; filter: drop-shadow(0 6px 20px rgba(0,0,0,0.5)); animation: logoBounce 2s ease-in-out infinite; }
    @keyframes logoBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none; flex-direction: column;
      width: 100%; max-width: 860px;
      height: 100%; padding: 14px 14px 80px; overflow-y: auto;
    }

    .hdr { display:flex; align-items:center; justify-content:space-between; background:white; border-radius:18px; padding:10px 18px; margin-bottom:10px; box-shadow:0 4px 14px rgba(0,0,0,0.1); flex-shrink:0; }
    .hdr-score { font-size:1.2em; font-weight:bold; color:#4CAF50; min-width:80px; }
    .hdr-title { font-size:clamp(0.75em,2.5vw,1em); color:#6a0dad; font-weight:bold; text-align:center; }
    .mute-btn { width:38px; height:38px; border:2px solid #ddd; border-radius:50%; background:white; font-size:1.1em; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    .progress-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-shrink:0; }
    .progress-label { font-size:0.9em; color:#777; white-space:nowrap; }
    .progress-bar-wrap { flex:1; height:10px; background:#e0e0e0; border-radius:5px; overflow:hidden; }
    .progress-bar-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#4CAF50,#8BC34A); transition:width 0.5s ease; }

    .instruction { text-align:center; font-size:clamp(0.95em,3vw,1.2em); color:#333; font-weight:800; margin-bottom:8px; padding:0 4px; flex-shrink:0; line-height:1.4; }

    .q-card {
      background: white; border-radius: 24px; padding: 28px 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; align-items: center; gap: 24px;
      margin-top: auto; margin-bottom: auto; flex-shrink: 0;
    }

    /* ── NUMBER CARDS ── */
    .num-cards { display: flex; align-items: center; justify-content: center; gap: 14px; width: 100%; }

    .num-card {
      width: 96px; height: 96px; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(1.4em, 5vw, 2em); font-weight: 800;
      border: 3px solid rgba(0,0,0,0.1);
      box-shadow: 0 6px 20px rgba(0,0,0,0.13); flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .num-card.known-left  { background: linear-gradient(135deg,#FF9800,#F57C00); color:white; border-color:#E65100; }
    .num-card.known-right { background: linear-gradient(135deg,#26C6DA,#00ACC1); color:white; border-color:#006978; }
    .num-card.blank {
      background: linear-gradient(135deg,#BBDEFB,#90CAF9 70%,#BBDEFB);
      color:#1565C0; border-color:#64B5F6;
      animation: blankPulse 1.1s ease-in-out infinite;
    }
    @keyframes blankPulse {
      0%,100% { box-shadow: 0 6px 20px rgba(0,0,0,0.13), 0 0 0 0 rgba(124,58,237,0.55); }
      50%      { box-shadow: 0 6px 20px rgba(0,0,0,0.13), 0 0 0 10px rgba(124,58,237,0); }
    }
    .num-card.drag-over {
      animation: none !important; border-color:#7c3aed !important; transform:scale(1.1);
      box-shadow: 0 0 0 5px rgba(124,58,237,0.35), 0 8px 24px rgba(0,0,0,0.18) !important;
    }
    .num-card.filled {
      background: linear-gradient(135deg,#55efc4,#00b894) !important;
      color:white !important; border-color:#007a5e !important;
      animation: cardPop 0.4s ease !important;
    }
    @keyframes cardPop { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
    .num-card.wrong-drop {
      background: linear-gradient(135deg,#ff7675,#d63031) !important;
      color:white !important; border-color:#f44336 !important;
      animation: shakeCard 0.42s ease !important;
    }
    @keyframes shakeCard { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-9px)} 75%{transform:translateX(9px)} }

    .card-sep { font-size:1.8em; font-weight:800; color:#bbb; flex-shrink:0; }

    .drag-hint { font-size:0.88em; color:#aaa; font-weight:700; letter-spacing:0.04em; display:flex; align-items:center; gap:6px; }
    .drag-hint span { font-size:1.2em; }

    /* ── CHOICE CARDS ── */
    .choices-row { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; width:100%; }

    .choice-btn {
      width:82px; height:82px;
      background: linear-gradient(135deg,#6c5ce7,#a29bfe);
      border:4px solid transparent; border-radius:18px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.55em; font-weight:800; color:white;
      cursor:grab; box-shadow:0 4px 14px rgba(108,92,231,0.35);
      transition:transform 0.12s, border-color 0.2s, opacity 0.2s;
      touch-action:none; min-height:44px;
    }
    .choice-btn.dragging { opacity:0.35; transform:scale(0.94); cursor:grabbing; }
    .choice-btn.hint     { border-color:#FFD700; animation:pulseHint 1s ease-in-out infinite; }
    .choice-btn.wrong    { border-color:#f44336; }
    @keyframes pulseHint { 0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.6)} 50%{box-shadow:0 0 0 12px rgba(255,215,0,0)} }

    #drag-ghost {
      position:fixed; pointer-events:none; z-index:1000;
      width:82px; height:82px; border-radius:18px;
      background:linear-gradient(135deg,#6c5ce7,#a29bfe);
      border:4px solid transparent;
      display:none; align-items:center; justify-content:center;
      font-size:1.55em; font-weight:800; color:white; font-family:inherit;
      box-shadow:0 14px 36px rgba(108,92,231,0.55); transform:scale(1.12);
    }

    .btn-restart { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#FF9800,#F57C00); color:white; border:none; border-radius:50px; padding:14px 36px; font-size:1.05em; font-family:inherit; font-weight:800; cursor:pointer; box-shadow:0 4px 16px rgba(255,152,0,0.4); z-index:50; white-space:nowrap; touch-action:manipulation; min-height:44px; }

    #toast { position:fixed; top:20%; left:50%; transform:translateX(-50%) scale(0); color:white; padding:14px 28px; border-radius:50px; font-size:1.4em; font-weight:800; box-shadow:0 6px 24px rgba(0,0,0,0.25); z-index:500; transition:transform 0.2s,opacity 0.2s; opacity:0; pointer-events:none; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) scale(1); opacity:1; }

    .confetti-piece { position:fixed; top:-10px; pointer-events:none; z-index:999; animation:confettiFall linear forwards; }
    @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

    #end-screen { display:none; position:fixed; inset:0; background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc); flex-direction:column; align-items:center; justify-content:center; gap:18px; z-index:150; padding:30px; }
    .end-trophy { font-size:4.5em; animation:trophySpin 1.5s ease-out; }
    @keyframes trophySpin { from{transform:rotate(-20deg) scale(0)} 60%{transform:rotate(10deg) scale(1.1)} to{transform:rotate(0deg) scale(1)} }
    .end-title { color:#FFD700; font-size:clamp(1.5em,5vw,2.2em); font-weight:bold; text-shadow:0 3px 10px rgba(0,0,0,0.3); text-align:center; }
    .end-sub   { color:rgba(255,255,255,0.9); font-size:1.1em; text-align:center; }
    .end-score-box { background:rgba(255,255,255,0.15); border-radius:16px; padding:12px 28px; color:white; font-size:1.4em; font-weight:bold; }
    .end-stars { font-size:2.2em; letter-spacing:4px; }
    .btn-play-again { background:#FFD700; color:#333; border:none; border-radius:50px; padding:14px 36px; font-size:1.1em; font-weight:800; font-family:inherit; cursor:pointer; box-shadow:0 4px 16px rgba(255,215,0,0.5); touch-action:manipulation; min-height:44px; }

    @media(max-width:768px){
      #game-screen{padding:10px 10px 76px;}
      .q-card{padding:20px 10px;gap:18px;}
      .num-card{width:80px;height:80px;}
      .choice-btn{width:72px;height:72px;font-size:1.4em;}
      #drag-ghost{width:72px;height:72px;font-size:1.4em;}
      .hdr-title{display:none;}
    }
    @media(max-width:480px){
      .num-card{width:68px;height:68px;font-size:clamp(1.1em,4.5vw,1.5em);border-radius:16px;}
      .num-cards{gap:10px;}
      .card-sep{font-size:1.4em;}
      .choice-btn{width:64px;height:64px;font-size:1.3em;border-radius:14px;}
      #drag-ghost{width:64px;height:64px;font-size:1.3em;border-radius:14px;}
      .choices-row{gap:10px;}
      .hdr-score{font-size:1em;}
      .instruction{font-size:clamp(0.85em,3.5vw,1em);margin-bottom:4px;}
      #game-screen{padding:8px 8px 76px;}
      .q-card{padding:14px 8px;gap:14px;border-radius:18px;}
    }
    @media(max-height:640px){
      .q-card{gap:14px;padding:16px 10px;}
      .num-card{width:72px;height:72px;}
      .choice-btn{width:68px;height:68px;font-size:1.3em;}
      #drag-ghost{width:68px;height:68px;font-size:1.3em;}
      .instruction{margin-bottom:4px;}
      .drag-hint{font-size:0.8em;}
    }
  </style>
</head>
<body>

<div id="intro-screen" onclick="startGame()">
  <img id="intro-logo" src="Assets/innovinelogo.png" alt="Innovine" onerror="this.style.display='none'">
</div>
<div id="toast"></div>
<div id="drag-ghost"></div>

<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">⭐ <span id="score-val">0</span> / 10</div>
    <div class="hdr-title">In-Between Numbers 31–50 · LY3</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
  </div>
  <div class="progress-row">
    <span class="progress-label">Q <span id="q-num">1</span> / 10</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="prog-bar" style="width:0%"></div>
    </div>
  </div>
  <div class="instruction" id="instruction-txt"></div>
  <div class="q-card">
    <div class="num-cards" id="num-cards"></div>
    <div class="drag-hint"><span>☝️</span> Drag the number to the <strong>?</strong></div>
    <div class="choices-row" id="choices-row"></div>
  </div>
  <button class="btn-restart" onclick="restartGame()">🔄 &nbsp;Restart</button>
</div>

<div id="end-screen">
  <div class="end-trophy">🏆</div>
  <div class="end-title">You have done a great job!</div>
  <div class="end-sub">You completed all 10 questions!</div>
  <div class="end-score-box">Score: &nbsp;<span id="final-score">0</span> / 10</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">▶ &nbsp;Play Again</button>
</div>

<script>
/* All between-type questions — numbers 31-50 */
const QUESTIONS = [
  { left:31, right:33, answer:32, choices:[32,30,34,31] },
  { left:34, right:36, answer:35, choices:[35,33,37,34] },
  { left:37, right:39, answer:38, choices:[38,36,40,37] },
  { left:40, right:42, answer:41, choices:[41,39,43,40] },
  { left:43, right:45, answer:44, choices:[44,42,46,43] },
  { left:46, right:48, answer:47, choices:[47,45,49,46] },
  { left:48, right:50, answer:49, choices:[49,47,51,48] },
  { left:33, right:35, answer:34, choices:[34,32,36,33] },
  { left:36, right:38, answer:37, choices:[37,35,39,38] },
  { left:44, right:46, answer:45, choices:[45,43,47,44] },
];

const sndWrong = new Audio('Assets/wrong.mp3');
const sndClaps = new Audio('Assets/free_claps.mp3');

function unlockAudio(){
  [sndWrong,sndClaps].forEach(s=>{s.play().catch(()=>{});s.pause();s.currentTime=0});
  document.removeEventListener('pointerdown',unlockAudio);
}
document.addEventListener('pointerdown', unlockAudio);

let curQ=0, score=0, muted=false, attempts=0, answered=false;

/* ── TTS ── */
function getVoice(){
  const v=window.speechSynthesis.getVoices();
  return v.find(x=>x.lang.startsWith('en')&&!x.name.includes('Google'))||v.find(x=>x.lang.startsWith('en'))||v[0];
}
function speak(text){
  if(!('speechSynthesis' in window)||muted)return;
  window.speechSynthesis.cancel();
  setTimeout(()=>{
    if(muted)return;
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US'; u.rate=0.7;
    const v=getVoice(); if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  },150);
}
window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged',()=>window.speechSynthesis.getVoices());

function playClaps(){
  if(muted)return;
  sndClaps.currentTime=0; sndClaps.play().catch(()=>{});
  setTimeout(()=>{sndClaps.pause();sndClaps.currentTime=0},3000);
}
function play(s){if(muted)return;s.currentTime=0;s.play().catch(()=>{});}

/* ── HELPERS ── */
function getChoiceBtn(val){return document.querySelector(`.choice-btn[data-val="${val}"]`);}
function clearChoiceStates(){document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('wrong','hint','dragging'));}
function getBlank(){return document.querySelector('.num-card.blank');}

function fillBlankCard(val){
  const blank=getBlank(); if(!blank)return;
  blank.classList.remove('blank','drag-over','wrong-drop');
  blank.classList.add('filled');
  blank.textContent=val;
}
function shakeBlankCard(){
  const blank=getBlank(); if(!blank)return;
  blank.classList.remove('drag-over');
  blank.classList.add('wrong-drop');
  setTimeout(()=>blank.classList.remove('wrong-drop'),500);
}

/* ── BUILD DISPLAY ── */
function buildCards(q){
  const wrap=document.getElementById('num-cards');
  wrap.innerHTML='';
  const makeCard=(val,cls)=>{const c=document.createElement('div');c.className='num-card '+cls;c.textContent=val;return c;};
  const makeSep=()=>{const s=document.createElement('div');s.className='card-sep';s.textContent='·';return s;};
  wrap.appendChild(makeCard(q.left,  'known-left'));
  wrap.appendChild(makeSep());
  wrap.appendChild(makeCard('?', 'blank'));
  wrap.appendChild(makeSep());
  wrap.appendChild(makeCard(q.right, 'known-right'));
}

function buildChoices(q){
  const row=document.getElementById('choices-row');
  row.innerHTML='';
  [...q.choices].sort(()=>Math.random()-0.5).forEach(n=>{
    const btn=document.createElement('div');
    btn.className='choice-btn';
    btn.dataset.val=String(n);
    btn.textContent=n;
    btn.addEventListener('pointerdown',e=>startDrag(e,n));
    row.appendChild(btn);
  });
}

/* ── DRAG LOGIC ── */
let dragVal=null, dragBtn=null;
const ghost=document.getElementById('drag-ghost');

function startDrag(e,val){
  if(answered)return;
  e.preventDefault();
  dragVal=val; dragBtn=e.currentTarget;
  dragBtn.classList.add('dragging');
  ghost.textContent=val;
  ghost.style.display='flex';
  moveGhost(e.clientX,e.clientY);
  dragBtn.setPointerCapture(e.pointerId);
  dragBtn.addEventListener('pointermove',onMove);
  dragBtn.addEventListener('pointerup',onDrop);
  dragBtn.addEventListener('pointercancel',cancelDrag);
}
function moveGhost(cx,cy){
  const w=ghost.offsetWidth||82, h=ghost.offsetHeight||82;
  ghost.style.left=(cx-w/2)+'px'; ghost.style.top=(cy-h/2)+'px';
}
function isOverBlank(cx,cy){
  const blank=getBlank(); if(!blank)return false;
  const r=blank.getBoundingClientRect();
  return cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom;
}
function onMove(e){
  e.preventDefault(); moveGhost(e.clientX,e.clientY);
  const blank=getBlank(); if(!blank)return;
  if(isOverBlank(e.clientX,e.clientY))blank.classList.add('drag-over');
  else blank.classList.remove('drag-over');
}
function onDrop(e){
  cleanup(e);
  if(isOverBlank(e.clientX,e.clientY)&&dragVal!==null){const v=dragVal;dragVal=null;selectChoice(v);}
  else dragVal=null;
}
function cancelDrag(e){cleanup(e);dragVal=null;}
function cleanup(e){
  e.currentTarget.removeEventListener('pointermove',onMove);
  e.currentTarget.removeEventListener('pointerup',onDrop);
  e.currentTarget.removeEventListener('pointercancel',cancelDrag);
  ghost.style.display='none';
  const blank=getBlank(); if(blank)blank.classList.remove('drag-over');
  if(dragBtn){dragBtn.classList.remove('dragging');dragBtn=null;}
}

/* ── GAME FLOW ── */
function startGame(){
  document.getElementById('intro-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  curQ=0; score=0; loadQuestion();
}

function loadQuestion(){
  if(curQ>=QUESTIONS.length){showEnd();return;}
  sndClaps.pause(); sndClaps.currentTime=0;
  answered=false; attempts=0; clearChoiceStates();
  const q=QUESTIONS[curQ];
  document.getElementById('q-num').textContent=curQ+1;
  document.getElementById('score-val').textContent=score;
  document.getElementById('prog-bar').style.width=(curQ/QUESTIONS.length*100)+'%';
  document.getElementById('instruction-txt').textContent=`What number comes BETWEEN ${q.left} and ${q.right}?`;
  buildCards(q); buildChoices(q);
  speak(`What number comes between ${q.left} and ${q.right}?`);
}

function selectChoice(val){
  if(answered)return;
  if(val===QUESTIONS[curQ].answer)registerCorrect(val);
  else registerWrong(val);
}

function registerCorrect(val){
  answered=true; clearChoiceStates(); fillBlankCard(val);
  score++; document.getElementById('score-val').textContent=score;
  window.speechSynthesis?.cancel(); playClaps();
  showToast('⭐ Correct!','#4CAF50'); spawnConfetti();
  setTimeout(()=>{curQ++;loadQuestion();},3200);
}

function registerWrong(val){
  if(answered)return;
  attempts++; play(sndWrong); shakeBlankCard();
  if(attempts===1){
    showToast('❌ Try again!','#f44336');
    setTimeout(hideToast,900);
    const correctBtn=getChoiceBtn(QUESTIONS[curQ].answer);
    if(correctBtn)correctBtn.classList.add('hint');
  } else {
    answered=true;
    showToast('❌ Wrong!','#f44336');
    setTimeout(()=>{
      clearChoiceStates();
      fillBlankCard(QUESTIONS[curQ].answer);
      showToast('💡 Correct answer!','#FF9800');
      setTimeout(()=>{curQ++;loadQuestion();},3000);
    },1000);
  }
}

/* ── UI ── */
function showToast(msg,color){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=color; t.classList.add('show');
  setTimeout(hideToast,1800);
}
function hideToast(){document.getElementById('toast').classList.remove('show');}

function spawnConfetti(){
  const c=['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF922B','#cc5de8'];
  for(let i=0;i<60;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}vw;background:${c[~~(Math.random()*c.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    document.body.appendChild(p); p.addEventListener('animationend',()=>p.remove());
  }
}

function toggleMute(){
  muted=!muted;
  document.getElementById('mute-btn').textContent=muted?'🔇':'🔊';
  if(muted){window.speechSynthesis?.cancel();sndClaps.pause();}
  else speak(`What number comes between ${QUESTIONS[curQ].left} and ${QUESTIONS[curQ].right}?`);
}

function showEnd(){
  document.getElementById('game-screen').style.display='none';
  document.getElementById('end-screen').style.display='flex';
  document.getElementById('final-score').textContent=score;
  document.getElementById('end-stars').textContent=score>=9?'⭐⭐⭐':score>=7?'⭐⭐':'⭐';
  window.speechSynthesis?.cancel(); playClaps(); spawnConfetti(); setTimeout(spawnConfetti,800);
}

function restartGame(){
  clearChoiceStates(); window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display='none';
  document.getElementById('game-screen').style.display='flex';
  curQ=0; score=0; answered=false; attempts=0; loadQuestion();
}
</script>
</body>
</html>
